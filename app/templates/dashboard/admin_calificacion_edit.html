{% extends "dashboard/admin_shell.html" %}
{% block title %}Editar Calificacion - Admin EdTech{% endblock %}

{% block admin_content %}
<div class="admin-page">
  <div class="welcome-section">
    <div class="welcome-card">
      <h1>Editar Calificacion</h1>
      <p>Actualiza asignatura, periodo, valor y observaciones sin eliminar el registro.</p>
    </div>
  </div>

  <div class="admin-section">
    <form method="POST" class="bulk-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="bulk-controls">
        <div>
          <label for="estudiante_id">Estudiante</label>
          <select id="estudiante_id" name="estudiante_id" class="table-select" required>
            {% for est in estudiantes %}
              <option value="{{ est.id }}" {% if calificacion.estudiante_id == est.id %}selected{% endif %}>
                {{ est.nombre }} {{ est.apellido }} {% if est.student_profile %}- {{ est.student_profile.student_id }}{% endif %}
              </option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="asignatura">Asignatura</label>
          <select id="asignatura" name="asignatura" class="table-select" required>
            {% for asignatura in asignaturas_predefinidas %}
              <option value="{{ asignatura }}" {% if calificacion.asignatura == asignatura %}selected{% endif %}>{{ asignatura }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="periodo">Periodo</label>
          <select id="periodo" name="periodo" class="table-select">
            <option value="">Sin periodo</option>
            {% for value, label in periodos_calificacion %}
              <option value="{{ value }}" {% if calificacion.periodo == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="anio">Ano</label>
          <select id="anio" name="anio" class="table-select">
            <option value="">Sin ano</option>
            {% for year in year_options %}
              <option value="{{ year }}" {% if calificacion.anio == year %}selected{% endif %}>{{ year }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="valor">Calificacion</label>
          <input id="valor" type="number" min="0" max="100" step="0.01" name="valor" class="table-select" value="{{ '%.2f'|format(calificacion.valor) }}" required>
        </div>
      </div>
      <div>
        <label for="observaciones" style="display:block; font-size:12px; margin-bottom:6px; color:var(--text2); font-weight:600;">Observaciones</label>
        <input id="observaciones" name="observaciones" class="table-select" value="{{ calificacion.observaciones or '' }}" placeholder="Observacion tecnica (opcional)">
      </div>
      <div class="section-actions" style="margin-top: 14px;">
        <button type="submit" class="btn btn-primary btn-sm">Guardar cambios</button>
        <a href="{{ url_for('admin.calificaciones') }}" class="btn btn-secondary btn-sm">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

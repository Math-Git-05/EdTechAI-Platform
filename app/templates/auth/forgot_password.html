{% extends "layout/base.html" %}
{% block title %}Recuperar contrasena - EdTech{% endblock %}

{% block extra_head %}
<style>
  .recover-wrap {
    min-height: calc(100vh - 56px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg);
  }

  .recover-card {
    width: 100%;
    max-width: 460px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 34px 28px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
  }

  .recover-card h1 {
    font-size: 28px;
    margin: 0 0 8px 0;
    text-align: center;
  }

  .recover-card p {
    text-align: center;
    color: var(--text2);
    font-size: 14px;
    margin: 0 0 24px 0;
    line-height: 1.6;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }

  .form-group input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
  }

  .btn-primary {
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--accent-h));
    color: #fff;
    cursor: pointer;
  }

  .recover-footer {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: var(--text2);
  }

  .recover-footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
</style>
{% endblock %}

{% block content %}
<div class="recover-wrap">
  <div class="recover-card">
    <h1>Recuperar contrasena</h1>
    <p>Ingresa tu correo para enviarte un enlace de restablecimiento.</p>

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label for="email">Correo electronico</label>
        <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
      </div>
      <button type="submit" class="btn-primary">Enviar enlace</button>
    </form>

    <div class="recover-footer">
      Recordaste tu clave? <a href="{{ url_for('auth.login') }}">Volver a iniciar sesion</a>
    </div>
  </div>
</div>
{% endblock %}

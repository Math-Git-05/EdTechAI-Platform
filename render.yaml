services:
  - type: web
    name: edtechai-platform
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --workers 2 --threads 4 --timeout 120
    autoDeploy: true
    envVars:
      - key: FLASK_CONFIG
        value: production
      - key: PYTHON_VERSION
        value: 3.12.8
